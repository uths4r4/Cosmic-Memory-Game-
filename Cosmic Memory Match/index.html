<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Memory Match</title>
    <meta name="description" content="A vibrant, interactive memory matching game built with HTML, CSS, and JS.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div id="floating-emojis" class="floating-emojis-container"></div>

    <main class="game-container">
        <header>
            <h1>Cosmic Match</h1>
            <div class="stats">
                <div class="moves-container">
                    <span>Moves</span>
                    <span id="moves">0</span>
                </div>
                <div class="timer-container">
                    <span>Time</span>
                    <span id="time">0:00</span>
                </div>
            </div>
            <button id="restart-btn" class="glow-btn">Restart Game</button>
        </header>

        <section class="grid-container">
            <div id="game-board" class="game-board">
            </div>
        </section>
    </main>

    <div id="landing-modal" class="modal">
        <div class="modal-content">
            <h2 style="font-size: 3.5rem; line-height: 1.1; margin-bottom: 20px;">Cosmic Match</h2>
            <p>Explore the galaxy and test your memory.</p>
            <button id="main-play-btn" class="glow-btn" style="font-size: 1.3rem; padding: 15px 40px;">Play</button>
        </div>
    </div>

    <div id="difficulty-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Select Difficulty</h2>
            <p>Choose your cosmic challenge</p>
            <div class="difficulty-btn-group">
                <button id="btn-easy" class="glow-btn btn-easy">Easy</button>
                <button id="btn-medium" class="glow-btn btn-medium">Medium</button>
                <button id="btn-hard" class="glow-btn btn-hard">Hard</button>
            </div>
        </div>
    </div>

    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="result-title"></h2>
            <div id="stars-container" class="stars-container"></div>
            <p id="result-message"></p>
            <button id="play-again-btn" class="glow-btn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
